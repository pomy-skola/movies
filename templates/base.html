<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Movie Explorer{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #f8f9fa; }

    .navbar-brand span { color: #f4c430; }

    .filter-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .movie-table th { background-color: #212529; color: #fff; }

    .badge-genre {
      font-size: .75rem;
      font-weight: 500;
    }

    .rating-pill {
      display: inline-block;
      min-width: 42px;
      text-align: center;
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 600;
      font-size: .85rem;
    }
    .rating-high   { background: #d4edda; color: #155724; }
    .rating-mid    { background: #fff3cd; color: #856404; }
    .rating-low    { background: #f8d7da; color: #721c24; }

    .result-count { font-size: .9rem; color: #6c757d; }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">🎬 Movie <span>Explorer</span></a>
    </div>
  </nav>

  <!-- Page content -->
  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
